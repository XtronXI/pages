<!DOCTYPE html>
<html lang="en">

<head>
    <base href="../">
    <meta charset="UTF-8">
    <meta content="IE=edge,chrome=1" http-equiv="X-UA-Compatible">
    <meta content="webkit" name="renderer">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <link as="image" href="./images/Loading_white.gif" rel="preload">
    <link href="./stylesheet/loading_mask.css" rel="stylesheet">
    <link href="./stylesheet/public_style.css" rel="stylesheet">
    <link href="./stylesheet/oreui.css" rel="stylesheet">
    <title>MCDOC | Getting Started</title>
</head>

<div class="loading_mask" id="loading_mask">
    <div>
        <div class="spinner"><img alt="" id="spinner_img" src="./images/Loading_white.gif"/></div>
        <div class="spinner">
            <div class="spinner"><span class="spinner_text">Loading...</span></div>
        </div>
        <noscript>
            <style>
                #spinner_img, .spinner_text {
                    display: none;
                }
            </style>
            <div class="spinner"><img alt="" id="spinner_img_error" src="./images/ErrorMessage.png"/></div>
            <div class="spinner">
                <div class="spinner"><span class="spinner_text_error">Page failed to load: The current environment does not support scripts, or scripts have been disabled.<br>Please switch to an environment that supports scripts, or enable scripts in your settings before accessing this site.</span></div>
            </div>
        </noscript>
    </div>
</div>

<body>
<display-area>
    <header>
        <div class="header_left">
            <div class="header_item header_item_left with_menu" id="back" onclick="clickedBack();">
                <img alt="" class="header_left_icon" id="back_icon" src="./images/Back.png"/>
            </div>
            <div class="header_item header_item_left" id="home" onclick="playSoundType(this);mainPage();">
                <img alt="" class="header_left_icon" src="./images/Home.png"/>
            </div>
        </div>
        <div class="header_logo">
            <div class="header_title">
                <img alt="MCDOC Icon" src="./images/Enchanters_Tome_MCD.png" style="max-height:40px; max-width:100%; width:auto; height:auto; object-fit:contain; display:block;"/>
                MCDOC
            </div>
        </div>
        <div class="header_right">
            <div class="header_item header_item_right" onclick="playSoundType(this);window.open('https://github.com/XtronXI/pages','_blank');">
                <img alt="" class="header_right_icon" src="./images/Github.png"/>
            </div>
            <div class="header_item header_item_right" onclick="playSoundType(this);window.open('https://discord.gg/GHaKtJCvgp','_blank');">
                <img alt="" class="header_right_icon" src="./images/Discord.png"/>
            </div>
            <div class="header_item header_item_right" onclick="playSoundType(this);window.open('https://reddit.com/r/OpenM/','_blank');">
                <img alt="" class="header_right_icon" src="./images/Reddit.png"/>
            </div>
        </div>
    </header>
    <display-body>
        <scroll-view class="main_scroll_view">
            <scroll-container class="primary_scroll_container">
                <main class="scroll_container" id="main">
                    <div class="block_spacing"></div>
                    <div class="block" id="header_notice">
                        <div class="main main-header">
                            <div class="header_notice_title">Getting Started</div>
                        </div>
                    </div>
                    <div class="block_spacing"></div>
                    <div class="block" id="welcome_message">
                        <div class="main header_notice_body">
                            <div class="description2">
                                <div class="title1 head_block_title">Welcome to MCDOC</div>
                                <div class="head_block_description">This is an extensive guide to help you get Minecraft, of any version/edition, for free. The resources here are safe and verified.</div>
                            </div>
                        </div>
                    </div>
                    <div class="block" id="editions">
                        <div class="main header_notice_body">
                            <div class="link_title">Select the Edition you want to play</div>
                            <div class="wrap_flex">
                                <link-block role="link" onclick="playSound('click');openLink('./bedrock');" aria-label="Bedrock">
                                    <div class="link_title">
                                        <img alt="Bedrock" class="link_title_img" src="./images/social/Bedrock_icon.png"/>
                                        Bedrock
                                    </div>
                                </link-block>
                                <link-block role="link" onclick="playSound('click');openLink('./java');" aria-label="Java">
                                    <div class="link_title">
                                        <img alt="Java" class="link_title_img" src="./images/social/Java_icon.png"/>
                                        Java
                                    </div>
                                </link-block>
                                <link-block role="link" onclick="playSound('click');openLink('./dungeons');" aria-label="Dungeons">
                                    <div class="link_title">
                                        <img alt="Dungeons" class="link_title_img" src="./images/social/Dungeons_icon.png"/>
                                        Dungeons
                                    </div>
                                </link-block>
                                <link-block role="link" onclick="playSound('click');openLink('./legends');" aria-label="Legends">
                                    <div class="link_title">
                                        <img alt="Legends" class="link_title_img" src="./images/social/Legends_icon.png"/>
                                        Legends
                                    </div>
                                </link-block>
                                <link-block role="link" onclick="playSound('click');openLink('./education');" aria-label="Education">
                                    <div class="link_title">
                                        <img alt="Education" class="link_title_img" src="./images/social/Education_icon.png"/>
                                        Education
                                    </div>
                                </link-block>
                            </div>
                            <div class="wrap_flex">
                                <link-block role="link" onclick="playSound('click');openLinkInNewTab('https://www.mcsmmegathread.org/');" aria-label="Story Mode">
                                    <div class="link_title">
                                        <img alt="Story Mode" class="link_title_img" src="./images/social/Story_Mode_icon.png"/>
                                        Story Mode
                                    </div>
                                </link-block>
                                <link-block role="link" onclick="playSound('click');openLinkInNewTab('https://minecraftlegacy.com/');" aria-label="Legacy Console">
                                    <div class="link_title">
                                        <img alt="Legacy Console" class="link_title_img" src="./images/social/Crafting_Table.png"/>
                                        Legacy Console
                                    </div>
                                </link-block>
                                <link-block role="link" onclick="playSound('click');openLink('./earth');" aria-label="Earth">
                                    <div class="link_title">
                                        <img alt="Earth" class="link_title_img" src="./images/social/Earth_icon.png"/>
                                        Earth
                                    </div>
                                </link-block>
                                <link-block role="link" onclick="playSound('click');openLink('./china');" aria-label="China">
                                    <div class="link_title">
                                        <img alt="China" class="link_title_img" src="./images/social/China_icon.png"/>
                                        China
                                    </div>
                                </link-block>
                            </div>
                        </div>
                    </div>
                </main>
            </scroll-container>
            <custom-scrollbar class="primary_custom_scrollbar">
                <custom-scrollbar-track></custom-scrollbar-track>
                <custom-scrollbar-thumb></custom-scrollbar-thumb>
            </custom-scrollbar>
        </scroll-view>
        </div>
        <!--
        <div class="new sidebar" id="sidebar">
            <scroll-view>
                <scroll-container class="secondary_scroll_container">
                    <div class="sidebar_content scroll_container">
                        <div class="sidebar_header">
                            <div class="sidebar_detail_title">版本库</div>
                        </div>
                        <div class="sidebar_list">
                            <a class="sidebar_item" href="javascript:void(0);">
                                <article_list>介绍</article_list>
                            </a>
                            <a class="sidebar_item" href="./index_new.html#latest_news">
                                <article_list_l2>最新动态</article_list_l2>
                            </a>
                        </div>
                    </div>
                </scroll-container>
                <custom-scrollbar class="secondary_custom_scrollbar">
                    <custom-scrollbar-track></custom-scrollbar-track>
                    <custom-scrollbar-thumb></custom-scrollbar-thumb>
                </custom-scrollbar>
            </scroll-view>
        </div>
        -->
    </display-body>
</display-area>
<!-- Exluding the Top Bar -->
<div class="new overlay_main" id="overlay_main" onclick="clickedOverlay();"></div>

<!-- Pop-Up Window -->
<div class="pop_area" id="pop_area"></div>

<!-- Prompt Window -->
<div class="overlay" id="overlay_alert_modal"></div>
<modal_area id="alert_modal" style="display: none;"></modal_area>
</body>

<script src="./javascript/loading.js"></script>
<script src="./library/accessibility.js"></script>
<script src="./javascript/public_script.js"></script>
<script src="./javascript/oreui.js"></script>
</html>
